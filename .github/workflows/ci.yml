name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm astro check
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: supabase start

      - name: Set Supabase env vars
        run: |
          supabase status -o env > /tmp/supabase-env
          echo "DATABASE_URL=$(grep '^DB_URL=' /tmp/supabase-env | cut -d= -f2-)" >> $GITHUB_ENV
          echo "SUPABASE_URL=$(grep '^API_URL=' /tmp/supabase-env | cut -d= -f2-)" >> $GITHUB_ENV
          echo "SUPABASE_PUBLISHABLE_KEY=$(grep '^ANON_KEY=' /tmp/supabase-env | cut -d= -f2-)" >> $GITHUB_ENV

      - name: Apply migrations and seed
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          for f in drizzle/0*.sql; do
            psql "$DATABASE_URL" -f "$f" || true
          done
          pnpm exec tsx src/db/seed.ts

      - name: Create .dev.vars for wrangler
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .dev.vars
          echo "SUPABASE_URL=$SUPABASE_URL" >> .dev.vars
          echo "SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY" >> .dev.vars

      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
